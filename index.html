    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;

    body {
      background-color: #000000;
      font-family: Verdana, sans-serif;
      margin: 0;
      overflow-x: hidden;

    ::-webkit-scrollbar {
      display: none;

    /* nav */
    nav {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      position: fixed;
      top: 30px;
      z-index: 5;
    }

    nav ul {
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: rgba(182, 180, 180, 0.5);
      border-radius: 10px;
      color: aliceblue;
      list-style: none;
      padding: 10px;
    }

    nav ul li {
      padding: 10px;
    }

    nav ul li a {
      text-decoration: none;
      margin: 0px 10px;
      color: white;
      border-radius: 8px;
      padding: 8px 40px;
      transition: 0.4s ease;
      font-family: 'Marmelad', sans-serif;
      font-size: 20px;
    }

    nav ul li a:hover {
      color: rgb(0, 0, 0);
      background-color: rgb(205, 220, 230);
      transition: 0.4s ease;
    }

    @media (max-width: 768px) {
      nav ul li a {
        padding: 8px 20px;
        font-size: 16px;
      }
    }

    @media (max-width: 576px) {
      nav ul li a {
        padding: 6px 16px;
        font-size: 12px;
      }
    }

    @media (max-width: 484px) {
      nav ul li a {
        padding: 6px 6px;
        font-size: 12px;
      }
    }

    @media (max-width: 397px) {
      nav ul li a {
        padding: 1px 1px;
        font-size: 10px;
      }
    }

    /* main */

    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 10em;

    }

    .section1 {
      display: flex;
      flex-direction: column;
      width: 100%;
      position: relative;
      box-sizing: border-box;
    }

    .section1 img {
      position: fixed;
      height: 100vh;
      object-fit: cover;
      width: 100%;
      top: 0;
      box-sizing: border-box;
      z-index: -1;
    }

    .section1 div {
      width: 100%;
      height: 100vh;
    }

    .section2 {
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
      background: rgb(0, 0, 0);
      background: linear-gradient(180deg,
          rgba(0, 0, 0, 1) 0%,
          rgba(11, 2, 82, 1) 100%);
      padding: 1em;
      width: 100%;
    }

    .about-us {
      display: block;
      position: relative;
      margin: 6em auto;
    }

    .about-us img {
      width: 100%;
      margin: 0 auto;
      position: relative;
      max-width: 600px;
      height: auto;
    }
